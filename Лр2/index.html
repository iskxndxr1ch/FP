<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЛР 2 — Список задач</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    

    body {
      min-height: 100vh;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 15px;
    }

    .app {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #222222;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #cccccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .form button,
    .filters button,
    .delete-btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .form button {
      padding: 12px 18px;
      background: #2563eb;
      color: white;
    }

    .form button:hover {
      background: #1d4ed8;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters button {
      padding: 9px 14px;
      background: #e5e7eb;
      color: #222222;
    }

    .filters button.active {
      background: #2563eb;
      color: white;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    .task-info {
      display: flex;
      align-items: center;
      gap: 10px;
      word-break: break-word;
    }

    .task-info input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .completed {
      text-decoration: line-through;
      color: #777777;
    }

    .delete-btn {
      padding: 8px 12px;
      background: #dc2626;
      color: white;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .empty-message {
      text-align: center;
      color: #777777;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Список задач</h1>

    <div class="form">
      <input type="text" id="taskInput" placeholder="Введите новую задачу" />
      <button id="addTaskButton">Добавить</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">Все</button>
      <button data-filter="active">Невыполненные</button>
      <button data-filter="completed">Выполненные</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
    <p class="empty-message" id="emptyMessage">Список задач пуст</p>
  </div>

  <script>
    let tasks = [];
    let currentFilter = "all";

    const taskInput = document.querySelector("#taskInput");
    const addTaskButton = document.querySelector("#addTaskButton");
    const taskList = document.querySelector("#taskList");
    const emptyMessage = document.querySelector("#emptyMessage");
    const filterButtons = document.querySelectorAll(".filters button");

    // Чистая функция для создания новой задачи
    const createTask = (text) => ({
      id: Date.now(),
      text,
      completed: false
    });

    // Чистая функция для добавления задачи без изменения исходного массива
    const addTask = (tasks, text) => [...tasks, createTask(text)];

    // Чистая функция для изменения статуса задачи
    const toggleTaskStatus = (tasks, taskId) =>
      tasks.map(task =>
        task.id === taskId
          ? { ...task, completed: !task.completed }
          : task
      );

    // Чистая функция для удаления задачи
    const deleteTask = (tasks, taskId) =>
      tasks.filter(task => task.id !== taskId);

    // Чистая функция для фильтрации задач по статусу
    const filterTasks = (tasks, filter) => {
      if (filter === "completed") {
        return tasks.filter(task => task.completed);
      }

      if (filter === "active") {
        return tasks.filter(task => !task.completed);
      }

      return tasks;
    };

    // Функция высшего порядка для обработки списка задач
    const processTasks = (tasks, callback) => tasks.map(callback);

    const renderTasks = () => {
      taskList.innerHTML = "";

      const visibleTasks = filterTasks(tasks, currentFilter);

      emptyMessage.style.display = visibleTasks.length === 0 ? "block" : "none";

      processTasks(visibleTasks, task => {
        const taskItem = document.createElement("li");
        taskItem.className = "task-item";

        const taskInfo = document.createElement("div");
        taskInfo.className = "task-info";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;
        checkbox.addEventListener("change", () => {
          tasks = toggleTaskStatus(tasks, task.id);
          renderTasks();
        });

        const taskText = document.createElement("span");
        taskText.textContent = task.text;
        taskText.className = task.completed ? "completed" : "";

        const deleteButton = document.createElement("button");
        deleteButton.textContent = "Удалить";
        deleteButton.className = "delete-btn";
        deleteButton.addEventListener("click", () => {
          tasks = deleteTask(tasks, task.id);
          renderTasks();
        });

        taskInfo.append(checkbox, taskText);
        taskItem.append(taskInfo, deleteButton);
        taskList.append(taskItem);

        return taskItem;
      });
    };

    addTaskButton.addEventListener("click", () => {
      const taskText = taskInput.value.trim();

      if (taskText === "") {
        return;
      }

      tasks = addTask(tasks, taskText);
      taskInput.value = "";
      renderTasks();
    });

    taskInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTaskButton.click();
      }
    });

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;

        filterButtons.forEach(item => item.classList.remove("active"));
        button.classList.add("active");

        renderTasks();
      });
    });

    renderTasks();
  </script>
</body>
</html>
